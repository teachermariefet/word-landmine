<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD LANDMINE!</title>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --danger: #FF4444;
            --success: #4CAF50;
            --dark: #333;
            --bg-home: url('home_page.png');
            --bg-game: url('game_page.png');
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Balsamiq Sans', cursive; overflow: hidden;
            background-color: #222;
        }

        .page { display: none; width: 100%; height: 100%; position: absolute; background-size: cover; background-position: center; }
        .active { display: flex; flex-direction: column; align-items: center; }

        #home-page { background-image: var(--bg-home); background-color: #1a1a2e; justify-content: center; gap: 15px; }
        #game-page { background-image: var(--bg-game); background-color: #2c3e50; padding-top: 20px; }

        .btn-ui {
            padding: 15px 30px; font-size: 1.5rem; font-family: 'Balsamiq Sans', cursive;
            font-weight: 700; background: white; border: 5px solid var(--dark);
            border-radius: 20px; cursor: pointer; box-shadow: 0 6px 0 var(--dark);
            transition: all 0.1s; min-width: 250px;
        }

        .btn-ui:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--dark); }
        .btn-start { background: var(--primary); color: #000; }

        .game-header {
            width: 100%; display: flex; flex-direction: column; align-items: center; 
            gap: 10px; padding: 0 10px; margin-bottom: 10px;
        }

        /* Responsive Scoreboard */
        .scoreboard { 
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; 
            width: 100%; max-height: 120px; overflow-y: auto;
        }
        
        .team-box {
            background: rgba(255, 255, 255, 0.95); padding: 5px 12px;
            border: 3px solid var(--dark); border-radius: 12px; text-align: center;
            min-width: 80px;
        }

        .score-val { font-size: 1.2rem; font-weight: bold; display: block; }
        .score-btns button { padding: 2px 12px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: 1px solid var(--dark); color: white; }

        #word-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; width: 95%; height: 65vh; overflow-y: auto; padding: 10px;
        }

        .word-card {
            background: #fff; border: 4px solid var(--dark); border-radius: 15px;
            padding: 20px 5px; font-size: 1.4rem; text-align: center; font-weight: 700;
            cursor: pointer; box-shadow: 0 5px 0 var(--dark); display: flex;
            align-items: center; justify-content: center; min-height: 100px;
        }

        #result-page { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; flex-direction: column; justify-content: center;
            align-items: center; background-size: cover; background-position: center;
            background-color: rgba(0,0,0,0.8);
        }

        #result-text { font-size: 5rem; color: white; text-shadow: 4px 4px 0px #000; margin-bottom: 30px; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; color: white; padding: 20px; text-align: center;
        }

        textarea { width: 90%; height: 120px; font-size: 1rem; border-radius: 10px; padding: 10px; }
        
        /* Team Input Styles */
        .team-input-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
        .t-name { width: 40%; padding: 12px; font-size: 1rem; border-radius: 8px; border: none; }

        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(-8px, 8px); }
            75% { transform: translate(8px, -8px); }
        }
        .shake { animation: shake 0.15s infinite; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <h1 style="color: var(--primary); font-size: 3rem; text-shadow: 4px 4px 0 #000; margin:0;">WORD LANDMINE</h1>
        <button class="btn-ui btn-start" onclick="startGame()">START GAME</button>
        <button class="btn-ui" onclick="showOverlay('groups')">SET TEAMS</button>
        <button class="btn-ui" onclick="showOverlay('settings')">EDIT WORDS</button>
        <button class="btn-ui" onclick="showOverlay('how-to')">HELP</button>
    </div>

    <div id="game-page" class="page">
        <div class="game-header">
            <div class="scoreboard" id="scoreboard"></div>
            <button class="btn-ui" style="min-width:100px; padding:5px; font-size: 0.9rem; box-shadow: 0 3px 0 var(--dark);" onclick="location.reload()">🏠 QUIT TO HOME</button>
        </div>
        <div id="word-grid"></div>
    </div>

    <div id="result-page">
        <h1 id="result-text"></h1>
        <button class="btn-ui" style="background: var(--primary);" onclick="closeResult()">CONTINUE >></button>
    </div>

    <div id="how-to" class="overlay">
        <h1>HOW TO PLAY</h1>
        <p>1. Pick a word.<br>2. Avoid the hidden bombs!<br>3. Points are awarded randomly (1, 3, or 5).</p>
        <button class="btn-ui" onclick="hideOverlays()">OK!</button>
    </div>

    <div id="settings" class="overlay">
        <h2>EDIT WORDS</h2>
        <textarea id="word-input">Apple, Banana, Cherry, Dragonfruit, Elderberry, Fig, Grape, Honeydew, Kiwi, Lemon, Mango, Orange, Pear, Quince, Raspberry, Strawberry</textarea>
        <p>Separate words with commas</p>
        <button class="btn-ui" onclick="hideOverlays()">SAVE WORDS</button>
    </div>

    <div id="groups" class="overlay">
        <h2>TEAMS (Max 8)</h2>
        <p>Fill in the names for the teams playing:</p>
        <div class="team-input-grid" id="team-inputs">
            <input type="text" class="t-name" value="Team 1">
            <input type="text" class="t-name" value="Team 2">
            <input type="text" class="t-name" placeholder="Team 3">
            <input type="text" class="t-name" placeholder="Team 4">
            <input type="text" class="t-name" placeholder="Team 5">
            <input type="text" class="t-name" placeholder="Team 6">
            <input type="text" class="t-name" placeholder="Team 7">
            <input type="text" class="t-name" placeholder="Team 8">
        </div>
        <button class="btn-ui" onclick="setupTeams()">SAVE TEAMS</button>
    </div>

    <audio id="snd-point" src="https://actions.google.com/sounds/v1/cartoon/clime_out.ogg"></audio>
    <audio id="snd-bomb" src="https://actions.google.com/sounds/v1/science_fiction/low_fuzz_explosion.ogg"></audio>

    <script>
        let teamData = [];
        let bombWords = new Set();
        let currentCard = null;

        function showOverlay(id) { document.getElementById(id).style.display = 'block'; }
        function hideOverlays() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

        function setupTeams() {
            teamData = [];
            const inputs = document.querySelectorAll('.t-name');
            inputs.forEach((input) => {
                if (input.value.trim() !== "") {
                    teamData.push({ name: input.value.trim(), score: 0 });
                }
            });
            if (teamData.length === 0) teamData.push({ name: "Solo Player", score: 0 });
            hideOverlays();
        }
        setupTeams(); // Run once on load

        function updateScore(idx, val) {
            teamData[idx].score += val;
            document.getElementById(`score-${idx}`).innerText = teamData[idx].score;
        }

        function startGame() {
            const raw = document.getElementById('word-input').value;
            const words = raw.split(',').map(w => w.trim()).filter(w => w !== "");
            if(words.length < 3) { alert("Please add at least 3 words!"); return; }

            bombWords.clear();
            let shuffled = [...words].sort(() => 0.5 - Math.random());
            let bombCount = Math.max(1, Math.floor(words.length / 4));
            for(let i=0; i<bombCount; i++) bombWords.add(shuffled[i]);

            const sb = document.getElementById('scoreboard');
            sb.innerHTML = '';
            teamData.forEach((t, i) => {
                sb.innerHTML += `
                <div class="team-box">
                    <div style="font-size:0.7rem; color:#555; overflow:hidden; white-space:nowrap;">${t.name}</div>
                    <span class="score-val" id="score-${i}">${t.score}</span>
                    <div class="score-btns">
                        <button onclick="updateScore(${i}, 1)" style="background:var(--success)">+</button>
                        <button onclick="updateScore(${i}, -3)" style="background:var(--danger)">💣</button>
                    </div>
                </div>`;
            });

            const grid = document.getElementById('word-grid');
            grid.innerHTML = '';
            words.sort(() => 0.5 - Math.random()).forEach(w => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerText = w;
                card.onclick = () => reveal(card, w);
                grid.appendChild(card);
            });

            document.getElementById('home-page').classList.remove('active');
            document.getElementById('game-page').classList.add('active');
        }

        function reveal(card, val) {
            currentCard = card;
            const resPage = document.getElementById('result-page');
            const resText = document.getElementById('result-text');
            resPage.classList.remove('shake');

            if (bombWords.has(val)) {
                resText.innerText = "💣 BOMB!";
                resPage.style.backgroundImage = "url('result_page_no.png')";
                resPage.classList.add('shake');
                document.getElementById('snd-bomb').play();
            } else {
                const points = [1, 3, 5][Math.floor(Math.random() * 3)];
                resText.innerText = "⭐ +" + points;
                resPage.style.backgroundImage = "url('result_page_yes.png')";
                document.getElementById('snd-point').play();
            }
            resPage.style.display = 'flex';
        }

        function closeResult() {
            document.getElementById('result-page').style.display = 'none';
            if (currentCard) {
                currentCard.style.visibility = 'hidden';
                currentCard.style.pointerEvents = 'none';
            }
        }
    </script>
</body>
</html>
